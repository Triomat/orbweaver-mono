name: orbweaver

services:
  # orbweaver backend — enhanced device-discovery with review workflow
  orbweaver:
    image: ghcr.io/triomat/orbweaver-backend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.orbweaver
    ports:
      - "8072:8072"
    command: >
      orbweaver
        --host 0.0.0.0
        --port 8072
        --diode-target grpc://${DIODE_HOST}:${DIODE_PORT}/diode
        --diode-client-id ${DIODE_CLIENT_ID}
        --diode-client-secret ${DIODE_CLIENT_SECRET}
    environment:
      - DIODE_TARGET=grpc://${DIODE_HOST}:${DIODE_PORT}/diode
      - ORBWEAVER_REVIEW_DIR=/reviews
      - ORBWEAVER_CORS_ORIGINS=*
    volumes:
      - orbweaver-reviews:/reviews
      - ${SSH_CONFIG:-../../orb/ssh-napalm.conf}:/opt/orb/ssh-napalm.conf:ro
    restart: unless-stopped

  # orbweaver UI — Nuxt 4 review management interface
  frontend:
    image: ghcr.io/triomat/orbweaver-frontend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      # Must be reachable from the user's browser — set ORBWEAVER_HOST to the
      # host's IP or domain name in docker/.env
      - NUXT_PUBLIC_API_BASE=http://${ORBWEAVER_HOST:-localhost}:8072
    depends_on:
      - orbweaver
    restart: unless-stopped

volumes:
  orbweaver-reviews:
    driver: local
